<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>글로벌 라디오</title>
    <style>
        /* 기본 설정: 모든 요소의 여백을 포함하여 계산 */
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', sans-serif; 
            margin: 0; 
            padding: 15px; 
            padding-bottom: 140px; /* 하단 플레이어 영역만큼 여백 확보 */
            background-color: #f2f2f7; 
            color: #1c1c1e; 
        }

        /* 헤더 디자인 */
        h1 { text-align: center; color: #007aff; font-size: 1.5rem; margin-top: 10px; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #8e8e93; font-size: 0.85rem; margin-bottom: 20px; }

        /* 모바일 앱 스타일의 추천 버튼 (가로 스크롤 또는 바둑판 배열) */
        .preset-container { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 8px; 
            margin-bottom: 20px; 
        }
        .preset-btn { 
            background: #ffffff; 
            border: none; 
            padding: 12px 5px; 
            border-radius: 12px; 
            font-size: 0.8rem; 
            font-weight: 600; 
            color: #333;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
            cursor: pointer; 
            transition: 0.2s;
            text-align: center;
        }
        .preset-btn:active { background: #e5e5ea; transform: scale(0.96); }

        /* 검색 창 */
        #search-box { display: flex; gap: 8px; margin-bottom: 20px; }
        input { 
            flex: 1; 
            padding: 12px 15px; 
            border: none; 
            border-radius: 12px; 
            font-size: 0.95rem; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
            outline: none;
        }
        input:focus { border: 2px solid #007aff; margin: -2px; }
        button#search-btn { 
            background: #007aff; 
            color: white; 
            border: none; 
            padding: 12px 18px; 
            border-radius: 12px; 
            font-weight: bold; 
            box-shadow: 0 2px 5px rgba(0,122,255,0.3);
        }

        /* 리스트 디자인 (터치하기 좋게 큼직하게) */
        .station-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 12px; }
        .station-item { 
            background: white; 
            padding: 16px; 
            border-radius: 16px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.04); 
            display: flex; 
            flex-direction: column; 
            gap: 6px;
        }
        .station-item:active { background: #f2f2f7; }
        .station-name { font-weight: bold; font-size: 1.05rem; color: #000; }
        .station-meta { font-size: 0.8rem; color: #8e8e93; }
        .tag-wrap { display: flex; gap: 5px; flex-wrap: wrap; }
        .tag { background: #e5f1ff; color: #007aff; padding: 3px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 500; }

        /* 📱 모바일 하단 고정 플레이어 (Bottom Player) */
        #player-container { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px); /* 아이폰 스타일의 반투명 효과 */
            border-top: 1px solid #e5e5ea;
            padding: 15px 20px 25px 20px; /* 하단 쓸어올리기 영역 고려 */
            box-shadow: 0 -4px 15px rgba(0,0,0,0.05);
            z-index: 1000; 
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #now-playing { font-size: 0.9rem; font-weight: 600; color: #ff2d55; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        audio { width: 100%; height: 44px; outline: none; }
    </style>
</head>
<body>

    <h1>📻 글로벌 라디오</h1>
    <p class="subtitle">전 세계의 소리를 내 손안에서</p>

    <div class="preset-container">
        <button class="preset-btn" onclick="quickSearch('news')">📰 뉴스</button>
        <button class="preset-btn" onclick="quickSearch('talk')">🗣️ 토크</button>
        <button class="preset-btn" onclick="quickSearch('classical')">🎻 클래식</button>
        <button class="preset-btn" onclick="quickSearch('jazz')">🎷 재즈</button>
        <button class="preset-btn" onclick="quickSearch('pop')">🎵 팝송</button>
        <button class="preset-btn" onclick="quickSearch('korea')">🇰🇷 한국</button>
    </div>

    <div id="search-box">
        <input type="text" id="input-tag" placeholder="직접 검색 (예: BBC, Rock)">
        <button id="search-btn">검색</button>
    </div>

    <ul id="station-list" class="station-list"></ul>

    <div id="player-container">
        <div id="now-playing">방송을 선택하여 재생하세요</div>
        <audio id="audio-player" controls>
            브라우저가 오디오 기능을 지원하지 않습니다.
        </audio>
    </div>

    <script>
        const audioPlayer = document.getElementById('audio-player');
        const nowPlayingText = document.getElementById('now-playing');
        const stationList = document.getElementById('station-list');
        const inputTag = document.getElementById('input-tag');

        function quickSearch(keyword) {
            inputTag.value = keyword;
            searchStations(keyword);
        }

        async function searchStations(keyword = '') {
            const query = keyword || inputTag.value.trim();
            stationList.innerHTML = '<p style="text-align:center; color:#8e8e93; font-size:0.9rem; padding: 20px;">방송국을 불러오는 중입니다...</p>';

            let url = `https://de1.api.radio-browser.info/json/stations/search?limit=30&is_https=true&hidebroken=true&order=clickcount&reverse=true`;
            if(query) {
                if(query.toLowerCase() === 'korea' || query === '한국') {
                    url += `&country=South Korea`;
                } else {
                    url += `&tagList=${encodeURIComponent(query)}`;
                }
            }

            try {
                const response = await fetch(url);
                const stations = await response.json();

                if (stations.length === 0) {
                    stationList.innerHTML = '<p style="text-align:center; color:#8e8e93; font-size:0.9rem; padding: 20px;">결과가 없습니다.</p>';
                    return;
                }

                stationList.innerHTML = '';
                stations.forEach(station => {
                    const li = document.createElement('li');
                    li.className = 'station-item';
                    
                    const tagsHtml = station.tags ? station.tags.split(',').slice(0, 3).map(t => `<span class="tag">${t.trim()}</span>`).join('') : '';

                    li.innerHTML = `
                        <div class="station-name">${station.name}</div>
                        <div class="station-meta">${station.country || '국가 미상'}</div>
                        <div class="tag-wrap">${tagsHtml}</div>
                    `;

                    // 리스트 클릭 시 재생 이벤트
                    li.onclick = () => {
                        nowPlayingText.innerText = `🔊 ${station.name}`;
                        audioPlayer.src = station.url_resolved;
                        audioPlayer.play().catch(e => alert("해당 채널이 현재 오프라인입니다."));
                    };

                    stationList.appendChild(li);
                });
            } catch (error) {
                stationList.innerHTML = '<p style="color:#ff3b30; text-align:center; font-size:0.9rem;">데이터를 가져오는데 실패했습니다.</p>';
            }
        }

        document.getElementById('search-btn').addEventListener('click', () => searchStations());
        inputTag.addEventListener('keypress', (e) => { if (e.key === 'Enter') searchStations(); });

        quickSearch('news');
    </script>
</body>
</html>
