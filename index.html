<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bright Global Radio</title>
    <style>
        /* 🎨 전체 테마: 밝고 화사한 그라디언트 배경 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); /* 부드러운 백색 그라디언트 */
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; color: #333; padding: 15px;
        }

        /* 📻 라디오 본체: 하얗고 깨끗한 조약돌 같은 디자인 */
        .radio-device {
            width: 100%; max-width: 450px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 30px; /* 아주 둥글게 */
            /* 부드럽고 고급스러운 그림자 */
            box-shadow: 0 20px 60px rgba(0,0,0,0.05), inset 0 0 2px rgba(255,255,255,0.5);
            padding: 40px 25px; 
            border: 1px solid rgba(255,255,255,0.6);
            backdrop-filter: blur(10px); /* 유리 효과 */
            position: relative;
            overflow: hidden;
        }
        
        /* 상단 장식 포인트 */
        .radio-device::before {
            content:''; position: absolute; top:0; left:0; width: 100%; height: 8px;
            background: linear-gradient(to right, #a1887f, #fbc02d, #f06292, #4fc3f7); /* 화사한 멀티 컬러 */
        }

        .brand {
            font-size: 0.7rem; text-transform: uppercase; letter-spacing: 3px;
            color: #aaa; text-align: center; margin-bottom: 25px; font-weight: bold;
        }

        /* ☀️ 디스플레이 패널: 밝고 화사한 파스텔 톤 screen */
        .display-panel {
            background: linear-gradient(120deg, #e0f7fa 0%, #fffde7 100%); /* 밝은 민트+옐로우 */
            border: 2px solid #fff; border-radius: 15px;
            padding: 20px; margin-bottom: 30px; 
            box-shadow: inset 0 2px 10px rgba(0,188,212,0.1), 0 5px 15px rgba(0,0,0,0.02);
            text-align: center;
        }
        
        .screen-text {
            color: #00838f; /* 진한 민트색 텍스트 */
            font-family: 'Verdana', sans-serif;
        }
        #led-status { font-size: 0.75rem; margin-bottom: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;}
        #led-station { font-size: 1.15rem; font-weight: 900; min-height: 1.4em; word-break: break-all; color: #006064; }

        /* 검색 컨트롤 */
        .search-steps { display: flex; flex-direction: column; gap: 20px; margin-bottom: 30px; }
        .step-group { display: flex; flex-direction: column; gap: 8px; }
        .step-label { font-size: 0.7rem; color: #f06292; letter-spacing: 1px; font-weight: bold; text-transform: uppercase; }
        
        /* 하얀색 입력창 디자인 */
        select {
            appearance: none; background: #fff; color: #555;
            border: 1px solid #e1e1e1; padding: 14px; border-radius: 12px;
            font-size: 0.95rem; cursor: pointer; outline: none;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        select:focus { border-color: #4fc3f7; box-shadow: 0 0 0 3px rgba(79, 195, 247, 0.2); }

        /* 화사한 스카이 블루 검색 버튼 */
        .tune-btn {
            background: linear-gradient(135deg, #4fc3f7 0%, #29b6f6 100%);
            color: #fff; border: none; padding: 16px;
            border-radius: 12px; font-size: 1rem; font-weight: bold;
            letter-spacing: 2px; cursor: pointer; transition: 0.2s;
            box-shadow: 0 5px 15px rgba(41, 182, 246, 0.3);
        }
        .tune-btn:hover { background: linear-gradient(135deg, #29b6f6 0%, #039be5 100%); }
        .tune-btn:active { transform: translateY(1px); box-shadow: 0 2px 5px rgba(41, 182, 246, 0.3); }

        /* 재생 영역 */
        .player-bar {
            margin-top: 10px; padding-top: 25px; border-top: 1px solid #eee;
            display: flex; flex-direction: column; align-items: center; gap: 15px;
        }
        
        /* 💖 화사한 핑크색 재생 버튼 */
        .play-btn {
            background: #fff; color: #f06292; border: none;
            width: 90px; height: 90px; border-radius: 50%; font-size: 0.8rem;
            font-weight: bold; cursor: pointer; display: flex; flex-direction: column;
            justify-content: center; align-items: center; gap: 6px;
            box-shadow: 0 10px 25px rgba(240, 98, 146, 0.2), inset 0 0 0 2px #f06292;
            transition: 0.2s;
        }
        .play-btn:hover { transform: scale(1.03); box-shadow: 0 12px 30px rgba(240, 98, 146, 0.3), inset 0 0 0 2px #f06292; }
        
        /* 재생 중일 때: 민트색으로 변경 및 맥박 효과 */
        .play-btn.playing { 
            color: #fff; background: linear-gradient(135deg, #4db6ac 0%, #26a69a 100%); 
            box-shadow: 0 10px 25px rgba(38, 166, 154, 0.3);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(38, 166, 154, 0.5); }
            70% { box-shadow: 0 0 0 15px rgba(38, 166, 154, 0); }
            100% { box-shadow: 0 0 0 0 rgba(38, 166, 154, 0); }
        }

        /* 결과 리스트 창 */
        .list-window {
            background: #fff; border-radius: 15px; height: 200px;
            overflow-y: auto; margin-top: 25px; border: 1px solid #eee;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.02);
        }
        .station-item {
            padding: 18px 15px; border-bottom: 1px solid #f5f5f5; cursor: pointer;
            display: flex; flex-direction: column; gap: 6px; transition: 0.1s;
        }
        .station-item:hover { background-color: #f0f9ff; }
        .st-name { color: #1a1a1a; font-size: 0.95rem; font-weight: 600; }
        .st-tags { color: #999; font-size: 0.75rem; background: #f5f5f5; padding: 2px 6px; border-radius: 4px; display: inline-block; align-self: flex-start;}

        /* 스크롤바 커스텀 (밝게) */
        .list-window::-webkit-scrollbar { width: 6px; }
        .list-window::-webkit-scrollbar-track { background: #f5f5f5; }
        .list-window::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }

        .no-data { padding: 50px 20px; text-align: center; color: #00838f; font-size: 0.9rem; line-height: 1.6; }
    </style>
</head>
<body>

<div class="radio-device">
    <div class="brand">Pure Sound Wave-1</div>

    <div class="display-panel">
        <div id="led-status" class="screen-text">SYSTEM READY</div>
        <div id="led-station" class="screen-text">HELLO WORLD</div>
    </div>

    <div class="search-steps">
        <div class="step-group">
            <div class="step-label">1. Pick a Country</div>
            <select id="country-select">
                <option value="">국가를 선택하세요 (Select)</option>
                <optgroup label="Asia & Oceania">
                    <option value="KR">Korea, South (대한민국)</option>
                    <option value="JP">Japan (일본)</option>
                    <option value="CN">China (중국)</option>
                    <option value="TW">Taiwan (대만)</option>
                    <option value="AU">Australia (호주)</option>
                </optgroup>
                <optgroup label="Americas">
                    <option value="US">United States (미국)</option>
                    <option value="CA">Canada (캐나다)</option>
                    <option value="BR">Brazil (브라질)</option>
                </optgroup>
                <optgroup label="Europe">
                    <option value="GB">United Kingdom (영국)</option>
                    <option value="FR">France (프랑스)</option>
                    <option value="DE">Germany (독일)</option>
                    <option value="IT">Italy (이탈리아)</option>
                    <option value="ES">Spain (스페인)</option>
                    <option value="SE">Sweden (스웨덴)</option>
                </optgroup>
            </select>
        </div>

        <div class="step-group">
            <div class="step-label">2. Pick a Genre (Optional)</div>
            <select id="genre-select">
                <option value="">전체 장르 (All Genres)</option>
                <option value="news">News (뉴스/시사)</option>
                <option value="talk">Talk (교양/토크)</option>
                <option value="classical">Classical (클래식)</option>
                <option value="jazz">Jazz (재즈)</option>
                <option value="pop">Pop (팝송)</option>
                <option value="kpop">K-Pop (케이팝)</option>
                <option value="lofi">Lofi (로파이)</option>
            </select>
        </div>

        <button id="search-btn" class="tune-btn">FIND STATIONS</button>
    </div>

    <div class="player-bar">
        <button id="play-btn" class="play-btn">
            <span id="btn-icon" style="font-size: 1.5rem;">▶</span>
            <span id="btn-text">PLAY</span>
        </button>
        <audio id="audio-player" style="display:none"></audio>
    </div>

    <div class="list-window">
        <ul id="station-list">
            <li class="no-data">안녕하세요! 국가를 선택하고<br>FIND 버튼을 눌러보세요. ✨</li>
        </ul>
    </div>
</div>

<script>
    const audioPlayer = document.getElementById('audio-player');
    const playBtn = document.getElementById('play-btn');
    const btnIcon = document.getElementById('btn-icon');
    const btnText = document.getElementById('btn-text');
    const ledStatus = document.getElementById('led-status');
    const ledStation = document.getElementById('led-station');
    const stationList = document.getElementById('station-list');
    const searchBtn = document.getElementById('search-btn');

    let isPlaying = false;
    let currentUrl = '';

    async function performSearch() {
        const countryCode = document.getElementById('country-select').value;
        const genre = document.getElementById('genre-select').value;

        if(!countryCode) {
            alert("먼저 국가를 선택해 주세요.");
            return;
        }

        ledStatus.innerText = "TUNING...";
        ledStation.innerText = "SCANNING WAWS";
        stationList.innerHTML = '<li class="no-data">방송국을 찾고 있어요...</li>';

        let url = `https://de1.api.radio-browser.info/json/stations/search?limit=100&is_https=true&hidebroken=true&order=clickcount&reverse=true`;
        url += `&countrycode=${countryCode}`;
        if(genre) url += `&tag=${encodeURIComponent(genre)}`;

        try {
            const response = await fetch(url);
            const stations = await response.json();

            if (stations.length === 0) {
                ledStatus.innerText = "NO SIGNAL";
                ledStation.innerText = "EMPTY FREQUENCY";
                stationList.innerHTML = `
                    <li class="no-data">
                        "조건에 맞는 라디오 채널이 없어요." 😥<br><br>
                        <small style="color:#aaa;">* 보안(HTTPS)을 지원하지 않거나,<br>방송이 일시 중단된 채널은 제외됩니다.</small>
                    </li>`;
                return;
            }

            ledStatus.innerText = "SIGNAL FOUND";
            ledStation.innerText = `${stations.length} CHANNELS READY`;
            stationList.innerHTML = '';

            stations.forEach(station => {
                const li = document.createElement('li');
                li.className = 'station-item';
                
                // 태그 디자인 가공
                const topTag = station.tags ? station.tags.split(',')[0].trim() : 'Radio';
                
                li.innerHTML = `
                    <div class="st-name">${station.name || 'Unknown'}</div>
                    <div class="st-tags">${topTag}</div>
                `;
                li.onclick = () => selectStation(station.url_resolved, station.name);
                stationList.appendChild(li);
            });
        } catch (error) {
            ledStatus.innerText = "SYSTEM ERROR";
            stationList.innerHTML = '<li class="no-data" style="color:red">연결 실패. 네트워크를 확인하세요.</li>';
        }
    }

    function selectStation(url, name) {
        currentUrl = url;
        ledStatus.innerText = "NOW TUNED";
        ledStation.innerText = name; 
        audioPlayer.src = url;
        startPlayback();
    }

    function startPlayback() {
        audioPlayer.play().then(() => {
            isPlaying = true;
            btnIcon.innerText = "■";
            btnText.innerText = "STOP";
            playBtn.classList.add('playing');
        }).catch(e => {
            ledStatus.innerText = "LINK BROKEN";
            ledStation.innerText = "TRY ANOTHER CHANNEL";
            isPlaying = false;
        });
    }

    function stopPlayback() {
        audioPlayer.pause();
        audioPlayer.src = ""; 
        audioPlayer.src = currentUrl;
        isPlaying = false;
        btnIcon.innerText = "▶";
        btnText.innerText = "PLAY";
        playBtn.classList.remove('playing');
        ledStatus.innerText = "STANDBY";
    }

    playBtn.addEventListener('click', () => {
        if(isPlaying) stopPlayback();
        else if(currentUrl) startPlayback();
    });

    searchBtn.addEventListener('click', performSearch);
</script>

</body>
</html>
