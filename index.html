<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Global Radio V3</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background-color: #1a1a1a; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; color: #d1d1d1; padding: 15px;
        }

        .radio-device {
            width: 100%; max-width: 450px;
            background: linear-gradient(145deg, #2b2b2b, #1f1f1f);
            border-radius: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 2px 2px rgba(255,255,255,0.1);
            padding: 30px 20px; border: 1px solid #333;
        }

        .brand {
            font-size: 0.75rem; text-transform: uppercase; letter-spacing: 4px;
            color: #666; text-align: center; margin-bottom: 20px;
        }

        /* LED 디스플레이 패널 */
        .display-panel {
            background-color: #0a0a0a; border: 4px solid #111; border-radius: 8px;
            padding: 20px; margin-bottom: 25px; box-shadow: inset 0 2px 15px rgba(0,0,0,1);
        }
        
        .led-text {
            font-family: 'Courier New', Courier, monospace; color: #ffb000;
            text-shadow: 0 0 10px rgba(255, 176, 0, 0.7); text-align: center;
        }
        #led-status { font-size: 0.75rem; margin-bottom: 8px; opacity: 0.8; }
        #led-station { font-size: 1.1rem; font-weight: bold; min-height: 1.4em; word-break: break-all; }

        /* 검색 스텝 영역 */
        .search-steps { display: flex; flex-direction: column; gap: 20px; margin-bottom: 25px; }
        .step-group { display: flex; flex-direction: column; gap: 8px; }
        .step-label { font-size: 0.7rem; color: #ffb000; letter-spacing: 1px; font-weight: bold; }
        
        select {
            appearance: none; background: #222; color: #eee;
            border: 1px solid #444; padding: 12px; border-radius: 6px;
            font-size: 0.95rem; cursor: pointer; outline: none;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }
        select:focus { border-color: #ffb000; }

        .tune-btn {
            background: linear-gradient(to bottom, #555, #222);
            color: #fff; border: 1px solid #000; padding: 16px;
            border-radius: 8px; font-size: 1rem; font-weight: bold;
            letter-spacing: 2px; cursor: pointer; transition: 0.1s;
            box-shadow: 0 4px 0 #111;
        }
        .tune-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #111; }

        /* 재생 영역 */
        .player-bar {
            margin-top: 10px; padding-top: 20px; border-top: 1px solid #333;
            display: flex; flex-direction: column; align-items: center; gap: 15px;
        }
        .play-btn {
            background: #111; color: #ff4d4d; border: 2px solid #333;
            width: 80px; height: 80px; border-radius: 50%; font-size: 0.8rem;
            font-weight: bold; cursor: pointer; display: flex; flex-direction: column;
            justify-content: center; align-items: center; gap: 4px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .play-btn.playing { color: #00ff00; border-color: #00ff00; text-shadow: 0 0 10px rgba(0,255,0,0.5); }

        /* 리스트 영역 */
        .list-window {
            background: #111; border-radius: 8px; height: 180px;
            overflow-y: auto; margin-top: 20px; border: 1px solid #000;
        }
        .station-item {
            padding: 15px; border-bottom: 1px solid #222; cursor: pointer;
            display: flex; flex-direction: column; gap: 4px;
        }
        .station-item:hover { background: #1a1a1a; }
        .st-name { color: #fff; font-size: 0.9rem; font-weight: bold; }
        .st-tags { color: #666; font-size: 0.75rem; }

        .no-data { padding: 40px 20px; text-align: center; color: #ffb000; font-size: 0.85rem; line-height: 1.5; }
    </style>
</head>
<body>

<div class="radio-device">
    <div class="brand">World-Band Digital Receiver</div>

    <div class="display-panel">
        <div id="led-status" class="led-text">SYSTEM STANDBY</div>
        <div id="led-station" class="led-text">SELECT COUNTRY</div>
    </div>

    <div class="search-steps">
        <div class="step-group">
            <div class="step-label">STEP 1: SELECT COUNTRY</div>
            <select id="country-select">
                <option value="">국가를 선택하세요 (Select)</option>
                <optgroup label="Asia & Oceania">
                    <option value="KR">Korea, South (대한민국)</option>
                    <option value="JP">Japan (일본)</option>
                    <option value="CN">China (중국)</option>
                    <option value="TW">Taiwan (대만)</option>
                    <option value="AU">Australia (호주)</option>
                    <option value="NZ">New Zealand (뉴질랜드)</option>
                    <option value="IN">India (인도)</option>
                    <option value="ID">Indonesia (인도네시아)</option>
                    <option value="TH">Thailand (태국)</option>
                    <option value="VN">Vietnam (베트남)</option>
                </optgroup>
                <optgroup label="Americas">
                    <option value="US">United States (미국)</option>
                    <option value="CA">Canada (캐나다)</option>
                    <option value="MX">Mexico (멕시코)</option>
                    <option value="BR">Brazil (브라질)</option>
                    <option value="AR">Argentina (아르헨티나)</option>
                    <option value="CL">Chile (칠레)</option>
                    <option value="CO">Colombia (콜롬비아)</option>
                </optgroup>
                <optgroup label="Europe">
                    <option value="GB">United Kingdom (영국)</option>
                    <option value="FR">France (프랑스)</option>
                    <option value="DE">Germany (독일)</option>
                    <option value="IT">Italy (이탈리아)</option>
                    <option value="ES">Spain (스페인)</option>
                    <option value="RU">Russia (러시아)</option>
                    <option value="NL">Netherlands (네덜란드)</option>
                    <option value="CH">Switzerland (스위스)</option>
                    <option value="SE">Sweden (스웨덴)</option>
                    <option value="NO">Norway (노르웨이)</option>
                    <option value="FI">Finland (핀란드)</option>
                    <option value="IE">Ireland (아일랜드)</option>
                    <option value="PT">Portugal (포르투갈)</option>
                    <option value="GR">Greece (그리스)</option>
                    <option value="PL">Poland (폴란드)</option>
                    <option value="UA">Ukraine (우크라이나)</option>
                </optgroup>
                <optgroup label="Middle East & Africa">
                    <option value="AE">U.A.E (아랍에미리트)</option>
                    <option value="SA">Saudi Arabia (사우디아라비아)</option>
                    <option value="TR">Turkey (튀르키예)</option>
                    <option value="IL">Israel (이스라엘)</option>
                    <option value="ZA">South Africa (남아프리카 공화국)</option>
                    <option value="EG">Egypt (이집트)</option>
                    <option value="MA">Morocco (모로코)</option>
                </optgroup>
            </select>
        </div>

        <div class="step-group">
            <div class="step-label">STEP 2: SELECT GENRE (OPTIONAL)</div>
            <select id="genre-select">
                <option value="">전체 장르 (All Genres)</option>
                <option value="news">News (뉴스/시사)</option>
                <option value="talk">Talk (교양/토크)</option>
                <option value="classical">Classical (클래식)</option>
                <option value="jazz">Jazz (재즈)</option>
                <option value="pop">Pop (팝송)</option>
                <option value="rock">Rock (락)</option>
                <option value="kpop">K-Pop (케이팝)</option>
                <option value="electronic">Electronic (일렉트로닉)</option>
                <option value="ambient">Ambient (앰비언트)</option>
                <option value="sports">Sports (스포츠)</option>
            </select>
        </div>

        <button id="search-btn" class="tune-btn">SEARCH FREQUENCY</button>
    </div>

    <div class="player-bar">
        <button id="play-btn" class="play-btn">
            <span id="btn-icon">▶</span>
            <span id="btn-text">PLAY</span>
        </button>
        <audio id="audio-player" style="display:none"></audio>
    </div>

    <div class="list-window">
        <ul id="station-list">
            <li class="no-data">국가를 선택한 후<br>SEARCH 버튼을 눌러주세요.</li>
        </ul>
    </div>
</div>

<script>
    const audioPlayer = document.getElementById('audio-player');
    const playBtn = document.getElementById('play-btn');
    const btnIcon = document.getElementById('btn-icon');
    const btnText = document.getElementById('btn-text');
    const ledStatus = document.getElementById('led-status');
    const ledStation = document.getElementById('led-station');
    const stationList = document.getElementById('station-list');
    const searchBtn = document.getElementById('search-btn');

    let isPlaying = false;
    let currentUrl = '';

    async function performSearch() {
        const countryCode = document.getElementById('country-select').value;
        const genre = document.getElementById('genre-select').value;

        if(!countryCode) {
            alert("먼저 국가를 선택해 주세요.");
            return;
        }

        ledStatus.innerText = "TUNING...";
        ledStation.innerText = "SCANNING...";
        stationList.innerHTML = '<li class="no-data">주파수를 탐색 중입니다...</li>';

        // 핵심 변경: country 이름 대신 고유 countrycode(KR, US 등)를 사용하여 정확도 극대화
        let url = `https://de1.api.radio-browser.info/json/stations/search?limit=100&is_https=true&hidebroken=true&order=clickcount&reverse=true`;
        url += `&countrycode=${countryCode}`;
        if(genre) url += `&tag=${encodeURIComponent(genre)}`;

        try {
            const response = await fetch(url);
            const stations = await response.json();

            if (stations.length === 0) {
                ledStatus.innerText = "NO SIGNAL";
                ledStation.innerText = "NOT FOUND";
                stationList.innerHTML = `
                    <li class="no-data">
                        "해당 조건의 라디오 채널이 없습니다."<br><br>
                        <small style="color:#888;">* 보안(HTTPS)을 지원하지 않거나,<br>방송국에서 차단한 채널은 표시되지 않습니다.</small>
                    </li>`;
                return;
            }

            ledStatus.innerText = "SIGNAL STRENGTH: HIGH";
            ledStation.innerText = `${stations.length} STATIONS READY`;
            stationList.innerHTML = '';

            stations.forEach(station => {
                const li = document.createElement('li');
                li.className = 'station-item';
                li.innerHTML = `
                    <div class="st-name">${station.name || 'Unknown Station'}</div>
                    <div class="st-tags">${station.tags ? station.tags.split(',').slice(0,3).join(', ') : 'No Tags'}</div>
                `;
                li.onclick = () => selectStation(station.url_resolved, station.name);
                stationList.appendChild(li);
            });
        } catch (error) {
            ledStatus.innerText = "SYSTEM ERROR";
            stationList.innerHTML = '<li class="no-data" style="color:red">연결 실패. 네트워크를 확인하세요.</li>';
        }
    }

    function selectStation(url, name) {
        currentUrl = url;
        ledStatus.innerText = "TUNED IN";
        ledStation.innerText = name.toUpperCase();
        audioPlayer.src = url;
        startPlayback();
    }

    function startPlayback() {
        audioPlayer.play().then(() => {
            isPlaying = true;
            btnIcon.innerText = "■";
            btnText.innerText = "STOP";
            playBtn.classList.add('playing');
        }).catch(e => {
            ledStatus.innerText = "LINK BROKEN";
            ledStation.innerText = "CANNOT PLAY STREAM";
            isPlaying = false;
        });
    }

    function stopPlayback() {
        audioPlayer.pause();
        audioPlayer.src = ""; 
        audioPlayer.src = currentUrl;
        isPlaying = false;
        btnIcon.innerText = "▶";
        btnText.innerText = "PLAY";
        playBtn.classList.remove('playing');
        ledStatus.innerText = "STANDBY";
    }

    playBtn.addEventListener('click', () => {
        if(isPlaying) stopPlayback();
        else if(currentUrl) startPlayback();
    });

    searchBtn.addEventListener('click', performSearch);
</script>

</body>
</html>
